name: Build .tipa on macOS

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install Theos
        run: |
          set -e
          git clone --depth=1 https://github.com/theos/theos.git $HOME/theos
          export THEOS=$HOME/theos
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV

      - name: Install sdks (theos/sdks)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          git clone https://github.com/theos/sdks.git $HOME/theos/sdks || true

      - name: Build package
        env:
          THEOS: ${{ env.THEOS }}
        run: |
          set -e
          cd $GITHUB_WORKSPACE
          make clean || true
          make package FINALPACKAGE=1

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: shzq-package
          path: packages/
